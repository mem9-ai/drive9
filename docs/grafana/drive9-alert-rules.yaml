groups:
  - name: drive9-fs-write
    rules:
      - alert: Drive9FSBackendWriteP99High
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (
              rate(drive9_service_operation_duration_seconds_bucket{component="backend",operation="write"}[5m])
            )
          ) > 2
        for: 10m
        labels:
          severity: page
          component: server
          path: fs_backend_write
        annotations:
          summary: Drive9 filesystem backend write p99 is high
          description: |
            p99 backend write latency after request-body read is above 2s for 10m.
            This alert isolates server/backend processing time from client upload time.

      - alert: Drive9FSUploadBodyReadP99High
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (
              rate(drive9_http_request_body_read_duration_seconds_bucket{method="PUT",route="/v1/fs/*"}[5m])
            )
          ) > 5
        for: 10m
        labels:
          severity: warning
          component: server
          path: fs_upload_body_read
        annotations:
          summary: Drive9 filesystem PUT request-body read p99 is high
          description: |
            p99 time spent reading inline PUT request bodies is above 5s for 10m.
            Treat this as a client upload or network-path signal. Use body_size_bucket
            and request logs to identify slow upload shapes before attributing the
            incident to backend write latency.
