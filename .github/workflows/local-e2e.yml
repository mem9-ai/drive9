name: local-e2e

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/local-e2e.yml"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "e2e/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
  push:
    # Post-merge tier: heavy suites run per merged commit (coalesced via the
    # concurrency group below) so a red run points at a handful of commits
    # instead of a whole day of them.
    branches:
      - main
    paths:
      - ".github/workflows/local-e2e.yml"
      - "cmd/**"
      - "pkg/**"
      - "internal/**"
      - "scripts/**"
      - "e2e/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
  schedule:
    # Daily heavy FUSE gate at 20:17 UTC / 04:17 Asia/Shanghai.
    - cron: "17 20 * * *"
  workflow_call:
    inputs:
      run_all_e2e:
        required: false
        default: "0"
        type: string
      feishu_proof:
        required: false
        default: "0"
        type: string
  workflow_dispatch:
    inputs:
      run_all_e2e:
        description: "Run every e2e suite in this workflow (overrides the individual toggles below; perf archive/compare keep their own toggles)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_fuse_concurrency_stress:
        description: "Run opt-in FUSE concurrency stress workload"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_fuse_posix_fsx:
        description: "Run opt-in FUSE POSIX/fsx-style workload"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_fuse_sqlite_wal:
        description: "Run opt-in FUSE SQLite WAL workload"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_fuse_sqlite_churn:
        description: "Run opt-in FUSE SQLite churn workload"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_fuse_sqlite_concurrency:
        description: "Run opt-in FUSE SQLite readers/writer workload"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_fuse_performance_baseline:
        description: "Run opt-in FUSE performance baseline and upload metrics artifacts"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      archive_fuse_performance_metrics:
        description: "Archive FUSE performance metrics to the Drive9 CI workspace"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      compare_fuse_performance_metrics:
        description: "Compare FUSE performance metrics against the Drive9 archived baseline"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_e2e_smoke_all:
        description: "Run full local smoke-all suite, including journal, POSIX permission, FUSE smoke, and Git workspace"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_git_feature_matrix:
        description: "Run Git feature matrix against a live FUSE mount"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      feishu_proof:
        description: "Prove the Feishu notification path: inject a synthetic failed suite so a card is sent on this (green) run. Does not fail the job or file an issue."
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

permissions:
  contents: read
  issues: write

concurrency:
  # Post-merge runs coalesce (one running + one queued, never cancelled) so
  # bursts of merges collapse into few runs; PR runs cancel superseded pushes.
  group: local-e2e-${{ github.event_name == 'push' && 'main-post-merge' || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

env:
  TIDB_VERSION: v8.5.5
  DRIVE9_BASE: http://127.0.0.1:9009
  DRIVE9_LOCAL_DSN: root@tcp(127.0.0.1:4000)/drive9_local?parseTime=true
  DRIVE9_LOCAL_INIT_SCHEMA: "true"
  DRIVE9_LOCAL_EMBEDDING_MODE: app
  RUN_SEMANTIC_CHECKS: "0"
  RUN_CLI_SEMANTIC_CHECKS: "0"
  RUN_FUSE_CONCURRENCY_STRESS: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_fuse_concurrency_stress) || '0') }}
  RUN_FUSE_POSIX_FSX: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_fuse_posix_fsx) || '0') }}
  RUN_FUSE_SQLITE_WAL: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_fuse_sqlite_wal) || '0') }}
  RUN_FUSE_SQLITE_CHURN: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_fuse_sqlite_churn) || '0') }}
  RUN_FUSE_SQLITE_CONCURRENCY: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_fuse_sqlite_concurrency) || '0') }}
  RUN_FUSE_PERFORMANCE_BASELINE: ${{ github.event_name == 'schedule' && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_fuse_performance_baseline) || '0') }}
  ARCHIVE_FUSE_PERFORMANCE_METRICS: ${{ github.event_name == 'schedule' && '1' || (github.event_name == 'workflow_dispatch' && inputs.archive_fuse_performance_metrics || '0') }}
  COMPARE_FUSE_PERFORMANCE_METRICS: ${{ github.event_name == 'schedule' && '1' || (github.event_name == 'workflow_dispatch' && inputs.compare_fuse_performance_metrics || '0') }}
  RUN_E2E_SMOKE_ALL: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_e2e_smoke_all) || '0') }}
  RUN_GIT_FEATURE_MATRIX: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && '1' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' && '1' || inputs.run_git_feature_matrix) || '0') }}
  RUN_POSIX_FEATURE_MATRIX: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.run_all_e2e == '1' && '1' || '0' }}
  # Report-only: hosted-runner FUSE numbers are too noisy for a hard
  # day-over-day gate (the first two nightly runs both false-failed here).
  # Deterministic perf gating lives in e2e/fuse-write-perf-budget-test.sh.
  FUSE_PERF_COMPARE_FAIL_ON_REGRESSION: "0"
  FUSE_CONCURRENCY_STRESS_REQUIRED: ${{ (github.event_name == 'schedule' || github.event_name == 'push' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && (inputs.run_all_e2e == '1' || inputs.run_fuse_concurrency_stress == '1'))) && '1' || '0' }}
  FEISHU_PROOF: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.feishu_proof == '1' && '1' || '0' }}
  FUSE_PERF_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/fuse-performance
  FUSE_CONCURRENCY_ARTIFACT_DIR: ${{ github.workspace }}/e2e-artifacts/fuse-concurrency
  FEATURE_MATRIX_REPORT_DIR: ${{ github.workspace }}/e2e-artifacts/feature-matrix

jobs:
  local-e2e:
    name: drive9-server-local e2e smoke
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client fuse3 jq

      - name: Cache TiUP artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.tiup/bin
            ~/.tiup/components
            ~/.tiup/manifests
            ~/.tiup/manifest
          key: ${{ runner.os }}-tiup-${{ env.TIDB_VERSION }}

      - name: Install TiUP and TiDB components
        run: |
          if [ ! -x "$HOME/.tiup/bin/tiup" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://tiup-mirrors.pingcap.com/install.sh | sh
          fi
          echo "$HOME/.tiup/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.tiup/bin:$PATH"
          tiup telemetry disable || true
          tiup install playground
          tiup install "tidb:${TIDB_VERSION}" "pd:${TIDB_VERSION}" "tikv:${TIDB_VERSION}"
          tiup --version

      - name: Start TiDB playground
        run: |
          export PATH="$HOME/.tiup/bin:$PATH"
          nohup tiup playground "${TIDB_VERSION}" --tiflash 0 --without-monitor > /tmp/tiup-playground.log 2>&1 &
          echo $! > /tmp/tiup-playground.pid

      - name: Wait for TiDB readiness and create local database
        run: |
          for _ in {1..60}; do
            if curl -sf http://127.0.0.1:10080/status > /tmp/tidb-status.json \
              && mysql --protocol=tcp -h 127.0.0.1 -P 4000 -u root \
                -e "CREATE DATABASE IF NOT EXISTS drive9_local;" > /tmp/tidb-sql-ready.log 2>&1; then
              cat /tmp/tidb-status.json
              exit 0
            fi
            sleep 5
          done
          echo "TiDB playground did not become ready in time" >&2
          cat /tmp/tidb-sql-ready.log >&2 || true
          exit 1

      - name: Start drive9-server-local
        run: |
          nohup make run-server-local > /tmp/drive9-server-local.log 2>&1 &
          echo $! > /tmp/drive9-server-local.pid

      - name: Wait for drive9-server-local readiness
        run: |
          for _ in {1..60}; do
            if curl -sf "$DRIVE9_BASE/healthz" > /tmp/drive9-healthz.json; then
              cat /tmp/drive9-healthz.json
              exit 0
            fi
            sleep 2
          done
          echo "drive9-server-local did not become ready in time" >&2
          exit 1

      - name: Run API smoke
        id: api-smoke
        continue-on-error: true
        run: bash e2e/api-smoke-test.sh

      - name: Run existing-key smoke
        id: existing-key-smoke
        continue-on-error: true
        env:
          DRIVE9_API_KEY: local-dev-key
        run: bash e2e/api-smoke-test-existing-key.sh

      - name: Run CLI smoke
        id: cli-smoke
        continue-on-error: true
        run: bash e2e/cli-smoke-test.sh

      - name: Run layer FS smoke
        id: layer-fs-smoke
        continue-on-error: true
        env:
          RUN_LAYER_FUSE_SMOKE: "1"
          LAYER_FUSE_STRICT_PREREQS: "1"
        run: bash e2e/layer-fs-smoke-test.sh

      - name: Run FUSE release gate
        id: fuse-smoke
        env:
          RUN_FUSE_CONCURRENCY_STRESS: "0"
          RUN_FUSE_POSIX_FSX: "0"
        run: bash e2e/fuse-release-gate.sh

      - name: Run Git operations smoke
        id: git-ops-smoke
        continue-on-error: true
        env:
          DRIVE9_API_KEY: local-dev-key
          FUSE_STRICT_PREREQS: "1"
        run: bash e2e/git-ops-smoke-test.sh

      - name: Run portable pack/unpack e2e
        id: portable-pack-unpack-e2e
        continue-on-error: true
        run: bash e2e/portable-pack-unpack-e2e.sh

      - name: Run FUSE crash recovery e2e
        id: fuse-crash-recovery
        continue-on-error: true
        run: bash e2e/fuse-crash-recovery-test.sh

      - name: Upload FUSE crash recovery artifacts
        if: always() && steps.fuse-crash-recovery.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fuse-crash-recovery
          path: /tmp/drive9-fuse-crash-*/mount.log
          if-no-files-found: warn

      - name: Run FUSE write perf budget e2e
        id: fuse-write-perf-budget
        continue-on-error: true
        run: bash e2e/fuse-write-perf-budget-test.sh

      - name: Upload FUSE write perf artifacts
        if: always() && steps.fuse-write-perf-budget.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fuse-write-perf-budget
          path: /tmp/drive9-fuse-write-perf-*/mount.log
          if-no-files-found: warn

      - name: Compare FUSE performance metrics
        id: fuse_performance_compare
        if: always() && env.RUN_FUSE_PERFORMANCE_BASELINE == '1' && env.COMPARE_FUSE_PERFORMANCE_METRICS == '1'
        env:
          DRIVE9_SERVER: https://api.drive9.ai
          DRIVE9_API_KEY: ${{ secrets.DRIVE9_ARCHIVE_API_KEY }}
          DRIVE9_PERF_SOURCE_DIR: ${{ env.FUSE_PERF_ARTIFACT_DIR }}
          DRIVE9_PERF_ARCHIVE_ROOT: /benchmarks/fuse-performance
          DRIVE9_PERF_BRANCH: ${{ github.ref_name }}
          DRIVE9_PERF_SHA: ${{ github.sha }}
          DRIVE9_PERF_RUN_ID: ${{ github.run_id }}
          DRIVE9_PERF_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bash scripts/compare-fuse-performance-metrics.sh

      - name: Upload FUSE performance artifacts
        if: always() && env.RUN_FUSE_PERFORMANCE_BASELINE == '1'
        uses: actions/upload-artifact@v4
        with:
          name: fuse-performance-baseline
          path: e2e-artifacts/fuse-performance
          if-no-files-found: warn

      - name: Archive FUSE performance metrics to Drive9
        if: >
          always() &&
          env.RUN_FUSE_PERFORMANCE_BASELINE == '1' &&
          env.ARCHIVE_FUSE_PERFORMANCE_METRICS == '1' &&
          (
            env.COMPARE_FUSE_PERFORMANCE_METRICS != '1' ||
            steps.fuse_performance_compare.outcome == 'success' ||
            steps.fuse_performance_compare.outcome == 'skipped'
          )
        env:
          DRIVE9_SERVER: https://api.drive9.ai
          DRIVE9_API_KEY: ${{ secrets.DRIVE9_ARCHIVE_API_KEY }}
          DRIVE9_PERF_SOURCE_DIR: ${{ env.FUSE_PERF_ARTIFACT_DIR }}
          DRIVE9_PERF_ARCHIVE_ROOT: /benchmarks/fuse-performance
          DRIVE9_PERF_REPOSITORY: ${{ github.repository }}
          DRIVE9_PERF_BRANCH: ${{ github.ref_name }}
          DRIVE9_PERF_SHA: ${{ github.sha }}
          DRIVE9_PERF_RUN_ID: ${{ github.run_id }}
          DRIVE9_PERF_RUN_ATTEMPT: ${{ github.run_attempt }}
          DRIVE9_PERF_WORKFLOW: ${{ github.workflow }}
          DRIVE9_PERF_EVENT_NAME: ${{ github.event_name }}
          DRIVE9_PERF_ARCHIVE_ALLOW_EMPTY: "1"
        run: bash scripts/archive-fuse-performance-metrics.sh

      - name: Run FUSE concurrency stress
        id: fuse-concurrency-stress
        if: always() && env.RUN_FUSE_CONCURRENCY_STRESS == '1'
        env:
          FUSE_CONCURRENCY_KEEP_ARTIFACTS: "1"
        run: bash e2e/fuse-concurrency-stress.sh

      - name: Upload FUSE concurrency artifacts
        if: always() && env.RUN_FUSE_CONCURRENCY_STRESS == '1'
        uses: actions/upload-artifact@v4
        with:
          name: fuse-concurrency-stress
          path: e2e-artifacts/fuse-concurrency
          if-no-files-found: warn

      - name: Run FUSE POSIX/fsx gate
        id: fuse-posix-fsx
        if: always() && env.RUN_FUSE_POSIX_FSX == '1'
        continue-on-error: true
        run: bash e2e/fuse-posix-fsx-gate.sh

      - name: Run full smoke-all suite
        id: smoke-all
        if: always() && env.RUN_E2E_SMOKE_ALL == '1'
        continue-on-error: true
        env:
          FUSE_STRICT_PREREQS: "1"
          RUN_GIT_WORKSPACE_SMOKE: "1"
          GIT_WORKSPACE_CLONE_TIMEOUT_S: "1800"
        run: bash e2e/smoke-all.sh

      - name: Run Git feature matrix
        id: git-feature-matrix
        if: always() && env.RUN_GIT_FEATURE_MATRIX == '1'
        continue-on-error: true
        env:
          FUSE_STRICT_PREREQS: "1"
        run: bash e2e/git-feature-matrix.sh

      - name: Build pjdfstest
        if: always() && env.RUN_POSIX_FEATURE_MATRIX == '1'
        continue-on-error: true
        run: |
          sudo apt-get install -y autoconf automake libtool
          git clone --depth 1 https://github.com/pjd/pjdfstest /tmp/pjdfstest
          cd /tmp/pjdfstest
          autoreconf -ifs
          ./configure
          make pjdfstest

      - name: Run pjdfstest POSIX suite
        id: pjdfstest-suite
        if: always() && env.RUN_POSIX_FEATURE_MATRIX == '1'
        continue-on-error: true
        env:
          PJDFSTEST_DIR: /tmp/pjdfstest
          PJDFSTEST_ALLOW_NONROOT: "1"
          FUSE_STRICT_PREREQS: "1"
        run: bash e2e/pjdfstest-suite.sh

      - name: Upload feature matrix artifacts
        if: always() && (env.RUN_GIT_FEATURE_MATRIX == '1' || env.RUN_POSIX_FEATURE_MATRIX == '1')
        uses: actions/upload-artifact@v4
        with:
          name: feature-matrix
          path: e2e-artifacts/feature-matrix
          if-no-files-found: warn

      - name: Publish local e2e summary
        if: always()
        run: |
          {
            echo "## drive9-server-local e2e"
            echo
            echo "| Check | Outcome |"
            echo "| --- | --- |"
            echo "| API smoke | ${{ steps.api-smoke.outcome || 'skipped' }} |"
            echo "| Existing-key smoke | ${{ steps.existing-key-smoke.outcome || 'skipped' }} |"
            echo "| CLI smoke | ${{ steps.cli-smoke.outcome || 'skipped' }} |"
            echo "| Layer FS smoke | ${{ steps.layer-fs-smoke.outcome || 'skipped' }} |"
            echo "| FUSE release gate | ${{ steps.fuse-smoke.outcome || 'skipped' }} |"
            echo "| Git operations smoke | ${{ steps.git-ops-smoke.outcome || 'skipped' }} |"
            echo "| Portable pack/unpack e2e | ${{ steps.portable-pack-unpack-e2e.outcome || 'skipped' }} |"
            echo "| FUSE crash recovery e2e | ${{ steps.fuse-crash-recovery.outcome || 'skipped' }} |"
            echo "| FUSE write perf budget e2e | ${{ steps.fuse-write-perf-budget.outcome || 'skipped' }} |"
            echo "| FUSE performance compare | ${{ steps.fuse_performance_compare.outcome || 'skipped' }} |"
            echo "| FUSE concurrency stress | ${{ steps.fuse-concurrency-stress.outcome || 'skipped' }} |"
            echo "| FUSE POSIX/fsx gate | ${{ steps.fuse-posix-fsx.outcome || 'skipped' }} |"
            echo "| Full smoke-all suite | ${{ steps.smoke-all.outcome || 'skipped' }} |"
            echo "| Git feature matrix | ${{ steps.git-feature-matrix.outcome || 'skipped' }} |"
            echo "| pjdfstest POSIX suite | ${{ steps.pjdfstest-suite.outcome || 'skipped' }} |"
            echo
            echo "FUSE concurrency stress: \`RUN_FUSE_CONCURRENCY_STRESS=${RUN_FUSE_CONCURRENCY_STRESS}\`"
            echo "FUSE concurrency stress required: \`FUSE_CONCURRENCY_STRESS_REQUIRED=${FUSE_CONCURRENCY_STRESS_REQUIRED}\`"
            echo "FUSE POSIX/fsx gate: \`RUN_FUSE_POSIX_FSX=${RUN_FUSE_POSIX_FSX}\`"
            echo "FUSE SQLite WAL: \`RUN_FUSE_SQLITE_WAL=${RUN_FUSE_SQLITE_WAL}\`"
            echo "FUSE SQLite churn: \`RUN_FUSE_SQLITE_CHURN=${RUN_FUSE_SQLITE_CHURN}\`"
            echo "FUSE SQLite concurrency: \`RUN_FUSE_SQLITE_CONCURRENCY=${RUN_FUSE_SQLITE_CONCURRENCY}\`"
            echo "FUSE performance baseline: \`RUN_FUSE_PERFORMANCE_BASELINE=${RUN_FUSE_PERFORMANCE_BASELINE}\`"
            echo "Archive FUSE performance metrics: \`ARCHIVE_FUSE_PERFORMANCE_METRICS=${ARCHIVE_FUSE_PERFORMANCE_METRICS}\`"
            echo "Compare FUSE performance metrics: \`COMPARE_FUSE_PERFORMANCE_METRICS=${COMPARE_FUSE_PERFORMANCE_METRICS}\`"
            echo "Full smoke-all suite: \`RUN_E2E_SMOKE_ALL=${RUN_E2E_SMOKE_ALL}\`"
            echo "Git feature matrix: \`RUN_GIT_FEATURE_MATRIX=${RUN_GIT_FEATURE_MATRIX}\`"
            echo "pjdfstest POSIX suite: \`RUN_POSIX_FEATURE_MATRIX=${RUN_POSIX_FEATURE_MATRIX}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # Turn the raw per-suite outcomes into one product-quality report: a richer
      # step summary grouped by product promise, an aggregated JSON for the
      # notifier, a signature-led issue body, and outputs (notify/signature/...).
      # failure() is only valid in `if:`, so capture "a prior step hard-failed"
      # (e.g. TiDB/server setup) as a marker file the aggregator can read.
      - name: Detect degraded pipeline
        if: failure()
        run: touch /tmp/e2e-degraded

      - name: Aggregate e2e product-quality report
        id: aggregate
        if: always()
        run: |
          cat > /tmp/e2e-outcomes.json <<JSON
          {
            "api-smoke": "${{ steps.api-smoke.outcome }}",
            "existing-key-smoke": "${{ steps.existing-key-smoke.outcome }}",
            "cli-smoke": "${{ steps.cli-smoke.outcome }}",
            "layer-fs-smoke": "${{ steps.layer-fs-smoke.outcome }}",
            "fuse-smoke": "${{ steps.fuse-smoke.outcome }}",
            "git-ops-smoke": "${{ steps.git-ops-smoke.outcome }}",
            "portable-pack-unpack-e2e": "${{ steps.portable-pack-unpack-e2e.outcome }}",
            "fuse-crash-recovery": "${{ steps.fuse-crash-recovery.outcome }}",
            "fuse-write-perf-budget": "${{ steps.fuse-write-perf-budget.outcome }}",
            "fuse_performance_compare": "${{ steps.fuse_performance_compare.outcome }}",
            "fuse-concurrency-stress": "${{ steps.fuse-concurrency-stress.outcome }}",
            "fuse-posix-fsx": "${{ steps.fuse-posix-fsx.outcome }}",
            "smoke-all": "${{ steps.smoke-all.outcome }}",
            "git-feature-matrix": "${{ steps.git-feature-matrix.outcome }}",
            "pjdfstest-suite": "${{ steps.pjdfstest-suite.outcome }}"
          }
          JSON
          proof_arg=""
          if [ "${FEISHU_PROOF}" = "1" ]; then
            proof_arg="--proof-fail-suite e2e-feishu-proof"
          fi
          degraded_arg=""
          if [ -f /tmp/e2e-degraded ]; then
            degraded_arg="--degraded"
          fi
          go run ./cmd/e2e-aggregate \
            --manifest e2e/suite-manifest.json \
            --outcomes /tmp/e2e-outcomes.json \
            --summaries e2e/reports/summary \
            --out /tmp/e2e-report.json \
            --issue-body /tmp/e2e-issue-body.md \
            $proof_arg $degraded_arg

      # Push failures/regressions that warrant attention to Feishu/Lark. PR-tier
      # failures stay in GitHub by policy; the notifier no-ops when no Feishu
      # secret is configured, so this never blocks a fork/PR without secrets.
      - name: Notify Feishu on post-merge/nightly failure or perf regression
        if: always() && steps.aggregate.outputs.notify == 'true'
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          go run ./cmd/feishu-notify --report /tmp/e2e-report.json

      - name: Dump TiDB playground logs
        if: always()
        run: |
          if [ -f /tmp/tiup-playground.log ]; then
            echo "=== tiup playground log ==="
            cat /tmp/tiup-playground.log
          fi

      - name: Dump drive9-server-local logs
        if: always()
        run: |
          if [ -f /tmp/drive9-server-local.log ]; then
            echo "=== drive9-server-local log ==="
            cat /tmp/drive9-server-local.log
          fi

      - name: Stop drive9-server-local
        if: always()
        run: |
          if [ -f /tmp/drive9-server-local.pid ]; then
            kill "$(cat /tmp/drive9-server-local.pid)" || true
          fi

      - name: Stop TiDB playground
        if: always()
        run: |
          if [ -f /tmp/tiup-playground.pid ]; then
            kill "$(cat /tmp/tiup-playground.pid)" || true
          fi

      - name: Enforce smoke results
        if: always()
        run: |
          failed=0

          check_required() {
            local name="$1"
            local outcome="$2"
            if [ "$outcome" != "success" ]; then
              echo "$name did not succeed (outcome: $outcome)"
              failed=1
            fi
          }

          check_required "API smoke" "${{ steps.api-smoke.outcome }}"
          check_required "Existing-key smoke" "${{ steps.existing-key-smoke.outcome }}"
          check_required "CLI smoke" "${{ steps.cli-smoke.outcome }}"
          check_required "Layer FS smoke" "${{ steps.layer-fs-smoke.outcome }}"
          check_required "FUSE release gate" "${{ steps.fuse-smoke.outcome }}"
          check_required "Git operations smoke" "${{ steps.git-ops-smoke.outcome }}"
          check_required "Portable pack/unpack e2e" "${{ steps.portable-pack-unpack-e2e.outcome }}"
          check_required "FUSE crash recovery e2e" "${{ steps.fuse-crash-recovery.outcome }}"
          check_required "FUSE write perf budget e2e" "${{ steps.fuse-write-perf-budget.outcome }}"
          if [ "${COMPARE_FUSE_PERFORMANCE_METRICS}" = "1" ]; then
            check_required "FUSE performance compare" "${{ steps.fuse_performance_compare.outcome }}"
          fi
          if [ "${FUSE_CONCURRENCY_STRESS_REQUIRED}" = "1" ]; then
            check_required "FUSE concurrency stress" "${{ steps.fuse-concurrency-stress.outcome }}"
          fi
          if [ "${RUN_FUSE_POSIX_FSX}" = "1" ]; then
            check_required "FUSE POSIX/fsx gate" "${{ steps.fuse-posix-fsx.outcome }}"
          fi
          if [ "${RUN_E2E_SMOKE_ALL}" = "1" ]; then
            check_required "Full smoke-all suite" "${{ steps.smoke-all.outcome }}"
          fi
          if [ "${RUN_GIT_FEATURE_MATRIX}" = "1" ]; then
            check_required "Git feature matrix" "${{ steps.git-feature-matrix.outcome }}"
          fi

          exit "$failed"

      # Scheduled/post-merge failures notify nobody by default, so a red
      # nightly can sit unnoticed for days. File (or append to) a tracking
      # issue instead.
      - name: File issue on scheduled/post-merge failure
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          SIGNATURE: ${{ steps.aggregate.outputs.signature }}
        run: |
          gh label create ci-e2e-failure --repo "$REPO" \
            --description "Automated: local-e2e scheduled/post-merge run failed" \
            --color D93F0B --force || true

          # Prefer the structured, signature-led body from the aggregator; fall
          # back to a one-liner if it is missing for any reason.
          if [ -s /tmp/e2e-issue-body.md ]; then
            body="$(cat /tmp/e2e-issue-body.md)"
            body="$body"$'\n\n'"_run: $RUN_URL_"
          else
            body="local-e2e \`$EVENT_NAME\` run failed on \`main\` at $SHA: $RUN_URL"
          fi

          # Group recurring failures by signature: an open issue carrying the same
          # signature is reused; a new signature opens its own tracking issue. With
          # no signature we keep the legacy single-issue behaviour.
          if [ -n "$SIGNATURE" ]; then
            existing="$(gh issue list --repo "$REPO" --label ci-e2e-failure --state open \
              --search "in:title $SIGNATURE" --json number --jq '.[0].number // empty')"
            title="local-e2e failure on main [sig: $SIGNATURE]"
          else
            existing="$(gh issue list --repo "$REPO" --label ci-e2e-failure --state open \
              --json number --jq '.[0].number // empty')"
            title="local-e2e $EVENT_NAME run failing on main"
          fi

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --label ci-e2e-failure \
              --title "$title" --body "$body"
          fi
