name: Deploy server to prod
on:
  workflow_dispatch:
    inputs:
      region:
        description: "Target region"
        required: true
        type: choice
        options:
          - all
          - aws-ap-southeast-1
          - aws-us-east-1
          - aws-us-west-2
          - alicloud-ap-southeast-1
          - tencentcloud-ap-beijing
      image_tag:
        description: "Image tag override (default: resolve from dev deployment)"
        required: false
        type: string

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: dat9-server
  DEPLOY_NAMESPACE: dat9
  K8S_DEPLOYMENT: dat9-server

jobs:
  deploy:
    name: Deploy to ${{ inputs.region }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ARN_PROD }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig for dev
        run: |
          aws eks update-kubeconfig \
            --name dev-dat9 \
            --region ap-southeast-1 \
            --alias dev

      - name: Resolve image from dev
        run: |
          INPUT_TAG='${{ inputs.image_tag }}'
          if [ -n "$INPUT_TAG" ]; then
            case "$INPUT_TAG" in
              *[![:alnum:]_.-]*)
                echo "Invalid image tag override" >&2
                exit 1
                ;;
            esac
            IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$INPUT_TAG"
          else
            IMAGE=$(kubectl --context dev -n "${{ env.DEPLOY_NAMESPACE }}" \
              get "deployment/${{ env.K8S_DEPLOYMENT }}" \
              -o 'jsonpath={.spec.template.spec.containers[?(@.name=="dat9-server")].image}')
          fi
          if [ -z "$IMAGE" ]; then
            echo "Failed to resolve image" >&2
            exit 1
          fi
          echo "Promoting image: $IMAGE"
          printf '%s=%s\n' "IMAGE" "$IMAGE" >> "$GITHUB_ENV"
          aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin "${IMAGE%%/*}"
          docker pull "$IMAGE"
      - name: Deploy to aws-ap-southeast-1
        id: deploy-sg
        if: inputs.region == 'all' || inputs.region == 'aws-ap-southeast-1'
        run: |
          echo "sg-deploy=1" >> "$GITHUB_ENV"
          aws eks update-kubeconfig \
            --name prod-dat9 \
            --region ap-southeast-1 \
            --alias prod
          kubectl --context prod -n "${{ env.DEPLOY_NAMESPACE }}" \
            set image "deployment/${{ env.K8S_DEPLOYMENT }}" \
            "${{ env.K8S_DEPLOYMENT }}=$IMAGE"
          kubectl --context prod -n "${{ env.DEPLOY_NAMESPACE }}" \
            rollout status "deployment/${{ env.K8S_DEPLOYMENT }}" \
            --timeout=300s

      - name: Rollback aws-ap-southeast-1 on failure
        if: failure() && steps.deploy-sg.outcome == 'failure'
        run: |
          kubectl --context prod -n "${{ env.DEPLOY_NAMESPACE }}" \
            rollout undo "deployment/${{ env.K8S_DEPLOYMENT }}"

      - name: Deploy drive9-tidbcloud to aws-ap-southeast-1
        id: deploy-sg-native
        if: inputs.region == 'all' || inputs.region == 'aws-ap-southeast-1'
        run: |
          kubectl --context prod -n drive9-tidbcloud \
            set image deployment/drive9-server \
            drive9-server=$IMAGE
          kubectl --context prod -n drive9-tidbcloud \
            rollout status deployment/drive9-server --timeout=300s

      - name: Rollback drive9-tidbcloud on failure
        if: failure() && steps.deploy-sg-native.outcome == 'failure'
        run: |
          kubectl --context prod -n drive9-tidbcloud \
            rollout undo deployment/drive9-server

      - name: Deploy to aws-us-east-1
        id: deploy-us
        if: inputs.region == 'all' || inputs.region == 'aws-us-east-1'
        run: |
          echo "us-deploy=1" >> "$GITHUB_ENV"
          aws eks update-kubeconfig \
            --name prod-dat9-us \
            --region us-east-1 \
            --alias us
          kubectl --context us -n "${{ env.DEPLOY_NAMESPACE }}" \
            set image "deployment/${{ env.K8S_DEPLOYMENT }}" \
            "${{ env.K8S_DEPLOYMENT }}=$IMAGE"
          kubectl --context us -n "${{ env.DEPLOY_NAMESPACE }}" \
            rollout status "deployment/${{ env.K8S_DEPLOYMENT }}" \
            --timeout=300s

      - name: Rollback aws-us-east-1 on failure
        if: failure() && steps.deploy-us.outcome == 'failure'
        run: |
          kubectl --context us -n "${{ env.DEPLOY_NAMESPACE }}" \
            rollout undo "deployment/${{ env.K8S_DEPLOYMENT }}"

      - name: Deploy drive9-tidbcloud to aws-us-east-1
        id: deploy-us-native
        if: inputs.region == 'all' || inputs.region == 'aws-us-east-1'
        run: |
          kubectl --context us -n drive9-tidbcloud \
            set image deployment/drive9-server \
            drive9-server=$IMAGE
          kubectl --context us -n drive9-tidbcloud \
            rollout status deployment/drive9-server --timeout=300s

      - name: Rollback drive9-tidbcloud aws-us-east-1 on failure
        if: failure() && steps.deploy-us-native.outcome == 'failure'
        run: |
          kubectl --context us -n drive9-tidbcloud \
            rollout undo deployment/drive9-server

      - name: Deploy drive9-tidbcloud to aws-us-west-2
        id: deploy-aws-us-west-2
        if: inputs.region == 'all' || inputs.region == 'aws-us-west-2'
        run: |
          aws eks update-kubeconfig \
            --name prod-drive9-usw2 \
            --region us-west-2 \
            --alias aws-us-west-2
          kubectl --context aws-us-west-2 -n drive9-tidbcloud \
            set image deployment/drive9-server \
            drive9-server=$IMAGE
          kubectl --context aws-us-west-2 -n drive9-tidbcloud \
            rollout status deployment/drive9-server --timeout=300s

      - name: Rollback drive9-tidbcloud aws-us-west-2 on failure
        if: failure() && steps.deploy-aws-us-west-2.outcome == 'failure'
        run: |
          kubectl --context aws-us-west-2 -n drive9-tidbcloud \
            rollout undo deployment/drive9-server

      - name: Configure Alibaba Cloud credentials
        if: inputs.region == 'all' || inputs.region == 'alicloud-ap-southeast-1'
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ALIYUN_ASSUME_ROLE_ARN }}
          oidc-provider-arn: ${{ secrets.ALIYUN_OIDC_PROVIDER_ARN }}

      - name: Push image to alicloud-ap-southeast-1 ACR
        if: inputs.region == 'all' || inputs.region == 'alicloud-ap-southeast-1'
        run: |
          curl -fsSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz | tar xz -C /usr/local/bin
          aliyun configure set --region ap-southeast-1 --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" --sts-token "$ALIBABA_CLOUD_SECURITY_TOKEN" --mode StsToken --profile github-actions
          aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin "${{ env.ECR_REGISTRY }}"
          docker pull "$IMAGE"
          TAG=$(echo "$IMAGE" | awk -F: '{print $NF}')
          ACR_IMAGE="${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/${{ env.ECR_REPOSITORY }}:$TAG"
          docker tag "$IMAGE" "$ACR_IMAGE"
          AUTH=$(aliyun --profile github-actions cr GetAuthorizationToken --InstanceId "${{ secrets.ALIYUN_ACR_INSTANCE_ID }}" --RegionId ap-southeast-1 | jq -r '.AuthorizationToken')
          echo "$AUTH" | docker login --username=cr_temp_user --password-stdin "${{ secrets.ALIYUN_ACR_REGISTRY }}"
          docker push "$ACR_IMAGE"
          echo "ACR_IMAGE=$ACR_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to alicloud-ap-southeast-1
        id: deploy-alicloud
        if: inputs.region == 'all' || inputs.region == 'alicloud-ap-southeast-1'
        run: |
          mkdir -p ~/.kube
          aliyun --profile github-actions cs GET "/k8s/c4dad0ecde1e94472a36fec0498e181ed/user_config" --region ap-southeast-1 | jq -r '.config' > ~/.kube/alicloud-config
          kubectl --kubeconfig ~/.kube/alicloud-config -n "${{ env.DEPLOY_NAMESPACE }}" \
            set image "deployment/${{ env.K8S_DEPLOYMENT }}" \
            "${{ env.K8S_DEPLOYMENT }}=$ACR_IMAGE"
          kubectl --kubeconfig ~/.kube/alicloud-config -n "${{ env.DEPLOY_NAMESPACE }}" \
            rollout status "deployment/${{ env.K8S_DEPLOYMENT }}" \
            --timeout=300s

      - name: Rollback alicloud-ap-southeast-1 on failure
        if: failure() && steps.deploy-alicloud.outcome == 'failure'
        run: |
          if [ -f ~/.kube/alicloud-config ]; then
            kubectl --kubeconfig ~/.kube/alicloud-config -n "${{ env.DEPLOY_NAMESPACE }}" \
              rollout undo "deployment/${{ env.K8S_DEPLOYMENT }}"
          fi

      - name: Configure Tencent Cloud credentials
        if: inputs.region == 'all' || inputs.region == 'tencentcloud-ap-beijing'
        uses: everpcpc/tencentcloud-oidc-auth@v1
        with:
          role-arn: ${{ secrets.TENCENTCLOUD_ROLE_ARN }}
          oidc-provider-id: github-actions
          audience: https://github.com/mem9-ai/drive9
          region: ap-beijing

      - name: Push image to tencentcloud-ap-beijing TCR
        if: inputs.region == 'all' || inputs.region == 'tencentcloud-ap-beijing'
        run: |
          pip3 install tccli -q
          if ! command -v tccli >/dev/null 2>&1; then
            echo "tccli install failed" >&2; exit 1
          fi
          TAG=$(echo "$IMAGE" | awk -F: '{print $NF}')
          TCR_IMAGE="drive9.tencentcloudcr.com/drive9/dat9-server:$TAG"
          docker tag "$IMAGE" "$TCR_IMAGE"
           TCR_LOG=/tmp/tcr-token.log
           tccli configure set secretId "$TENCENTCLOUD_SECRET_ID" secretKey "$TENCENTCLOUD_SECRET_KEY" region "$TENCENTCLOUD_REGION" 2>/dev/null || true
           tccli tcr CreateInstanceToken --region ap-beijing --RegistryId tcr-jkzfg64e --TokenType longterm >"$TCR_LOG"
           TCR_USER=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Username','100049824031'))" < "$TCR_LOG" 2>/dev/null) || true
           TCR_TOKEN=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Token'])" < "$TCR_LOG" 2>/dev/null) || true
           if [ -z "$TCR_TOKEN" ]; then
             echo "create TCR token failed" >&2
             exit 1
           fi
           rm -f "$TCR_LOG"
           echo "::add-mask::$TCR_TOKEN"
          echo "$TCR_TOKEN" | docker login drive9.tencentcloudcr.com --username "$TCR_USER" --password-stdin
          docker push "$TCR_IMAGE"
          echo "TCR_IMAGE=$TCR_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to tencentcloud-ap-beijing
        id: deploy-tencent
        if: inputs.region == 'all' || inputs.region == 'tencentcloud-ap-beijing'
        run: |
          mkdir -p ~/.kube
          tccli tke DescribeClusterKubeconfig --ClusterId cls-6dpiw235 --IsExtranet true --region ap-beijing | python3 -c "import sys,json; print(json.load(sys.stdin)['Kubeconfig'])" > ~/.kube/tencent-config
          kubectl --kubeconfig ~/.kube/tencent-config -n drive9-tidbcloud \
            set image deployment/drive9-server \
            drive9-server=$TCR_IMAGE
          kubectl --kubeconfig ~/.kube/tencent-config -n drive9-tidbcloud \
            rollout status deployment/drive9-server --timeout=300s

      - name: Rollback tencentcloud-ap-beijing on failure
        if: failure() && steps.deploy-tencent.outcome == 'failure'
        run: |
          if [ -f ~/.kube/tencent-config ]; then
            kubectl --kubeconfig ~/.kube/tencent-config -n drive9-tidbcloud \
              rollout undo deployment/drive9-server
          fi

  resolve-drive9-sha:
    # Resolves the drive9 short SHA from the image tag being promoted, so the
    # csi-publish job can dispatch a matching k8s-csi build in parallel with
    # the deploy job. Kept independent of `deploy` so both run concurrently.
    name: Resolve drive9 SHA for CSI build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      drive9_sha: ${{ steps.resolve.outputs.drive9_sha }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ARN_PROD }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig for dev
        run: |
          aws eks update-kubeconfig \
            --name dev-dat9 \
            --region ap-southeast-1 \
            --alias dev

      - name: Resolve drive9 short SHA from image tag
        id: resolve
        run: |
          set -euo pipefail
          INPUT_TAG='${{ inputs.image_tag }}'
          if [ -n "$INPUT_TAG" ]; then
            case "$INPUT_TAG" in
              *[![:alnum:]_.-]*)
                echo "Invalid image tag override" >&2
                exit 1
                ;;
            esac
            TAG="$INPUT_TAG"
          else
            IMAGE=$(kubectl --context dev -n "${{ env.DEPLOY_NAMESPACE }}" \
              get "deployment/${{ env.K8S_DEPLOYMENT }}" \
              -o 'jsonpath={.spec.template.spec.containers[?(@.name=="dat9-server")].image}')
            if [ -z "$IMAGE" ]; then
              echo "Failed to resolve image from dev" >&2
              exit 1
            fi
            TAG="${IMAGE##*:}"
          fi
          # dev-cd tags images as `<branch>-<sha7>`; extract the trailing SHA.
          SHA="${TAG##*-}"
          if [ -z "$SHA" ] || [ "${#SHA}" -lt 7 ]; then
            echo "Could not extract drive9 short SHA from tag: $TAG" >&2
            exit 1
          fi
          case "$SHA" in
            *[![:alnum:]]*)
              echo "Extracted SHA has unexpected characters: $SHA" >&2
              exit 1
              ;;
          esac
          printf 'Resolved drive9 short SHA: %s (from tag %s)\n' "$SHA" "$TAG"
          printf 'drive9_sha=%s\n' "$SHA" >> "$GITHUB_OUTPUT"

  csi-publish:
    # Dispatches drive9-ai/k8s-csi's publish-image.yml to build a drive9-csi
    # image pinned to the drive9 commit currently being promoted to prod.
    # Runs in parallel with `deploy` — a failed prod rollout does not cancel
    # the CSI build (and vice versa).
    name: Publish drive9-csi image
    needs: resolve-drive9-sha
    uses: ./.github/workflows/csi-publish-trigger.yml
    with:
      drive9_ref: ${{ needs.resolve-drive9-sha.outputs.drive9_sha }}
    secrets:
      CSI_DISPATCH_TOKEN: ${{ secrets.CSI_DISPATCH_TOKEN }}
