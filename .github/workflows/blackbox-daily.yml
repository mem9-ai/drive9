name: blackbox-daily

on:
  schedule:
    # 06:00 UTC every day
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: blackbox-daily
  cancel-in-progress: false

env:
  DRIVE9_LOCAL_INIT_SCHEMA: "true"
  DRIVE9_LOCAL_EMBEDDING_MODE: none

jobs:
  blackbox-daily:
    name: blackbox-daily (community)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake bison build-essential fio flex fuse3 gettext git libacl1-dev libcurl4-openssl-dev libmpich-dev libssl-dev libtool mpich perl pkg-config python3-dev python3-pip zlib1g-dev

      - name: Build drive9 CLI
        run: CGO_ENABLED=0 go build -o bin/drive9 ./cmd/drive9

      - name: Build drive9-server-local
        run: CGO_ENABLED=0 go build -o bin/drive9-server-local ./cmd/drive9-server-local

      - name: Cache blackbox dependencies
        uses: actions/cache@v4
        with:
          path: blackbox/work/cache
          key: blackbox-community-${{ runner.os }}-${{ hashFiles('blackbox/suites/**/deps.py', 'blackbox/suites/**/dependencies.json') }}
          restore-keys: |
            blackbox-${{ runner.os }}-

      - name: Prepare blackbox dependencies
        run: |
          python3 blackbox/run.py --group community \
            --server-mode local --bin ./bin/drive9 --local-server ./bin/drive9-server-local \
            --deps-only

      - name: Run blackbox (community)
        run: |
          python3 blackbox/run.py --group community \
            --server-mode local --bin ./bin/drive9 --local-server ./bin/drive9-server-local

      - name: Publish job summary
        if: always()
        run: |
          latest="$(find blackbox/work -name report.md -type f 2>/dev/null | sort | tail -n 1 || true)"
          if [ -n "$latest" ]; then
            cat "$latest" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No blackbox report produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload blackbox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-daily-community
          path: |
            blackbox/work/**/report.md
            blackbox/work/**/suite-report.json
          if-no-files-found: warn