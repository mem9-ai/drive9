name: code-ci

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout agfs dependency
        run: |
          git clone --depth 1 https://github.com/c4pt0r/agfs ../agfs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache golangci-lint binary
        uses: actions/cache@v4
        with:
          path: bin/golangci-lint
          key: ${{ runner.os }}-golangci-lint-bin-${{ hashFiles('Makefile', 'go.mod') }}

      - name: Cache golangci-lint analysis cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-cache-${{ hashFiles('go.sum', 'Makefile') }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-cache-

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Install failpoint-ctl
        run: go install github.com/pingcap/failpoint/failpoint-ctl@latest

      - name: Failpoint test
        run: make test-failpoint

      - name: Build (server and cli)
        run: make build
