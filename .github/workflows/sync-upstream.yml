name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch: # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Sync upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/mem9-ai/drive9.git || true
          git fetch upstream

          # Nothing to do if already up-to-date.
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "already_up_to_date=false" >> "$GITHUB_OUTPUT"

          # Try a clean fast-forward or conflict-free merge directly to main.
          git checkout main
          if git merge upstream/main --no-edit; then
            echo "merge_clean=true" >> "$GITHUB_OUTPUT"
            git push origin main
          else
            # Merge has conflicts — abort and prepare a PR branch instead.
            git merge --abort
            echo "merge_clean=false" >> "$GITHUB_OUTPUT"

            BRANCH="sync-upstream/$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH" upstream/main
            echo "pr_branch=$BRANCH" >> "$GITHUB_OUTPUT"
            git push origin "$BRANCH"
          fi

      - name: Create PR for conflicting merge
        if: steps.sync.outputs.merge_clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          CONFLICTS=$(git diff --name-only main..upstream/main -- '*.go' | head -20)
          gh pr create \
            --base main \
            --head "${{ steps.sync.outputs.pr_branch }}" \
            --title "sync: merge upstream/main (conflicts need manual resolution)" \
            --body "$(cat <<'EOF'
          Automatic upstream sync detected merge conflicts and skipped the auto-merge
          to avoid silently overwriting fork-specific code.

          **Conflicting files (Go):**
          \`\`\`
          $CONFLICTS
          \`\`\`

          Please merge \`main\` into this branch, resolve conflicts manually, then merge the PR.

          ```bash
          git fetch origin
          git checkout ${{ steps.sync.outputs.pr_branch }}
          git merge origin/main
          # resolve conflicts, then:
          git add -A && git commit
          git push
          ```
          EOF
          )"
