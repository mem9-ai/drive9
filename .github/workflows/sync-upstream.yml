name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch: # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST /repos/${{ github.repository }}/merge-upstream \
            -f branch=main
