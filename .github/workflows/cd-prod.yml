name: Prod CD

on:
  push:
    tags:
      - release-*
  workflow_dispatch:
    inputs:
      region:
        description: 'The region to deploy to'
        required: true
        default: 'us-west-2'
        type: string

# IMPORTANT: Do NOT add concurrency with cancel-in-progress here.
# Reason: The deploy job only runs when code changes are detected.
# If workflow A is building (has code changes) and workflow B starts (no code changes),
# cancel-in-progress would cancel A, but B would skip the build job entirely.
# This results in the image for commit A never being built.

jobs:
  build:
    name: Build
    runs-on: self-hosted
    env:
      ECR_REPO: tidbcloud/drive9-server
      IMAGE_NAME: drive9-server
      AWS_ROLE_ARN: ${{ secrets.DBAAS_PROD_AWS_ROLE }}
      AWS_REGION: us-west-2
    permissions:
      contents: "read"
    steps:
      - name: check out code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACTION_BOT }}

      - name: Checkout agfs dependency
        run: git clone --depth 1 https://github.com/c4pt0r/agfs ../agfs

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
        env:
          GOPRIVATE: "github.com/tidbcloud,github.com/pingcap/dbaas"

      - name: configure git for private modules
        env:
          TOKEN: ${{ secrets.GIT_ACTION_BOT }}
        run: git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Compute image tag
        id: image-tag
        run: |
          REF_NAME=${{ github.ref_name }}
          REF_NAME=${REF_NAME/\//-}
          echo "tag=${REF_NAME}-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build server binary
        run: make build-server GOOS=linux GOARCH=amd64

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          FULL_IMAGE=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.image-tag.outputs.tag }}
          docker build -t ${{ env.IMAGE_NAME }} .
          docker tag ${{ env.IMAGE_NAME }} ${FULL_IMAGE}
          docker push ${FULL_IMAGE}

  setup:
    runs-on: self-hosted
    outputs:
      region: ${{ steps.prepare-region.outputs.region }}
    steps:
      - name: Define region to deploy
        id: prepare-region
        run: |
          if [[ "${{ github.event.inputs.region }}" == "" ]]; then
            echo 'region=["us-west-2"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event.inputs.region }}" == "*" ]]; then
            echo 'region must be specified, but not *' >> "$GITHUB_OUTPUT"
            exit 1
          fi
          input="${{ github.event.inputs.region }}"
          echo "region=[\"${input//,/\",\"}\"]" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy
    needs: [build, setup]
    runs-on: self-hosted
    strategy:
      matrix:
        region: ${{ fromJSON(needs.setup.outputs.region) }}
    steps:
      - name: Get PR number
        id: pr-number
        run: |
          out=`curl -u tidbcloud-bot:${{ secrets.GIT_ACTION_BOT }} -H "Accept: application/vnd.github.groot-preview+json" https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls | jq '.[].number'`
          echo "pr=$out" >> "$GITHUB_OUTPUT"

      - name: set BUMP_VERSION
        run: |
          REF_NAME=${{ github.ref_name }}
          REF_NAME=${REF_NAME/\//-}
          BUMP_VERSION=${REF_NAME}-${{ github.sha }}
          echo "BUMP_VERSION=${BUMP_VERSION}" >> $GITHUB_ENV

      - name: Bump version in app-delivery repo
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: bump-drive9-version.yaml
          repo: tidbcloud/app-delivery
          ref: refs/heads/main
          token: ${{ secrets.GIT_ACTION_BOT }}
          inputs: '{ "project": "drive9", "version": "${{ env.BUMP_VERSION }}", "env": "prod", "region": "${{ matrix.region }}", "url": "https://github.com/${{ github.repository }}/pull/${{ steps.pr-number.outputs.pr }}", "author": "${{ github.actor }}" }'
