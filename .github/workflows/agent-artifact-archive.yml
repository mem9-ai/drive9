name: Agent artifact archive

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to backfill or repair. Empty publishes current main.
        required: false
        type: string
      recent_commits:
        description: Number of recent main commits to reconcile when commit_sha is empty.
        required: false
        default: "20"
        type: string
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: agent-artifact-archive
  cancel-in-progress: false

jobs:
  publish:
    name: Publish agent archive
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    env:
      DRIVE9_SERVER: ${{ secrets.DRIVE9_ARCHIVE_SERVER }}
      DRIVE9_API_KEY: ${{ secrets.DRIVE9_ARCHIVE_API_KEY }}
      DRIVE9_PUBLISHER_URL: ${{ vars.DRIVE9_PUBLISHER_URL }}
      DRIVE9_PUBLISHER_SHA256: ${{ vars.DRIVE9_PUBLISHER_SHA256 }}
      DRIVE9_ARCHIVE_ROOT: ${{ vars.DRIVE9_ARCHIVE_ROOT || '/drive9' }}
      DRIVE9_ARCHIVE_COMMIT_SHA: ${{ github.event.inputs.commit_sha || '' }}
      DRIVE9_ARCHIVE_RECENT_COMMITS: ${{ github.event.inputs.recent_commits || vars.DRIVE9_ARCHIVE_RECENT_COMMITS || '20' }}
      DRIVE9_ARCHIVE_CLI_TARGETS: ${{ vars.DRIVE9_ARCHIVE_CLI_TARGETS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate archive configuration
        run: |
          set -euo pipefail
          test -n "${DRIVE9_SERVER}" || { echo "DRIVE9_ARCHIVE_SERVER secret is required" >&2; exit 1; }
          test -n "${DRIVE9_API_KEY}" || { echo "DRIVE9_ARCHIVE_API_KEY secret is required" >&2; exit 1; }
          test -n "${DRIVE9_PUBLISHER_URL}" || { echo "DRIVE9_PUBLISHER_URL repository variable is required" >&2; exit 1; }
          test -n "${DRIVE9_PUBLISHER_SHA256}" || { echo "DRIVE9_PUBLISHER_SHA256 repository variable is required" >&2; exit 1; }

      - name: Install pinned drive9 publisher
        run: |
          set -euo pipefail
          publisher="${RUNNER_TEMP}/drive9-publisher"
          curl -fsSL -o "${publisher}" "${DRIVE9_PUBLISHER_URL}"
          echo "${DRIVE9_PUBLISHER_SHA256}  ${publisher}" | sha256sum -c -
          chmod +x "${publisher}"
          "${publisher}" version
          echo "DRIVE9_PUBLISHER=${publisher}" >> "${GITHUB_ENV}"

      - name: Publish archive
        run: ./scripts/publish-agent-archive.sh
