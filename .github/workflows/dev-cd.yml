name: Deploy server to dev

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/dev-cd.yml'
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch, tag, or SHA to deploy"
        required: true
        default: "main"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  AWS_ASSUME_ARN: ${{ secrets.AWS_ASSUME_ARN }}
  ECR_REPOSITORY: dat9-server
  EKS_CLUSTER: dev-dat9
  DEPLOY_NAMESPACE: dat9
  K8S_DEPLOYMENT: dat9-server

jobs:
  deploy:
    name: Build and deploy to dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ref || github.ref }}

      - name: Resolve image tag
        run: |
          REF_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ref || github.ref_name }}"
          REF_NAME=${REF_NAME#refs/heads/}
          REF_NAME=${REF_NAME#refs/tags/}
          REF_NAME=${REF_NAME//\//-}
          REF_NAME=$(printf '%s' "$REF_NAME" | tr -c '[:alnum:]_.-' '-')
          TAG="${REF_NAME}-$(git rev-parse --short=7 HEAD)"
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Checkout agfs dependency
        run: |
          git clone --depth 1 https://github.com/c4pt0r/agfs ../agfs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ASSUME_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          IMAGE_BASE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          # amd64 (native)
          make docker-build IMAGE_REPO=$IMAGE_BASE IMAGE_TAG=${{ env.IMAGE_TAG }}-amd64 GOARCH=amd64
          docker push $IMAGE_BASE:${{ env.IMAGE_TAG }}-amd64
          # arm64 — cross-compile binary, then build arm64 Docker image
          mkdir -p bin
          CGO_ENABLED=0 GOARCH=arm64 go build -o bin/drive9-server ./cmd/drive9-server
          docker build --platform linux/arm64 -t $IMAGE_BASE:${{ env.IMAGE_TAG }}-arm64 .
          docker push $IMAGE_BASE:${{ env.IMAGE_TAG }}-arm64
          # multi-arch manifest
          docker manifest create $IMAGE_BASE:${{ env.IMAGE_TAG }} \
            $IMAGE_BASE:${{ env.IMAGE_TAG }}-amd64 \
            $IMAGE_BASE:${{ env.IMAGE_TAG }}-arm64
          docker manifest push $IMAGE_BASE:${{ env.IMAGE_TAG }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to dat9
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_DEPLOYMENT }}=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -n ${{ env.DEPLOY_NAMESPACE }}
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.DEPLOY_NAMESPACE }} \
            --timeout=180s

      - name: Deploy to drive9-tidbcloud
        run: |
          kubectl set image deployment/drive9-server \
            drive9-server=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -n drive9-tidbcloud
          kubectl rollout status deployment/drive9-server \
            -n drive9-tidbcloud \
            --timeout=180s

      - name: Rollback dat9 on failed deploy
        if: failure()
        run: |
          kubectl rollout undo deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.DEPLOY_NAMESPACE }}

      - name: Rollback drive9-tidbcloud on failed deploy
        if: failure()
        run: |
          kubectl rollout undo deployment/drive9-server \
            -n drive9-tidbcloud
