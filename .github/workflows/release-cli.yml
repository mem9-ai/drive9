name: Release CLI binaries

on:
  workflow_run:
    workflows: ["Deploy server to prod"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: release-cli
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish CLI
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Checkout agfs dependency
        run: |
          git clone --depth 1 https://github.com/c4pt0r/agfs ../agfs

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        run: |
          SOURCE_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          VERSION="${SOURCE_SHA::7}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build CLI for all platforms
        run: |
          make build-cli-release DIST_DIR=dist VERSION="${{ env.VERSION }}"

      - name: Ensure version file
        run: |
          echo "${{ env.VERSION }}" > dist/version

      - name: Push to drive9-fe
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.DRIVE9_FE_DEPLOY_TOKEN }}@github.com/mem9-ai/drive9-fe.git" /tmp/drive9-fe
          mkdir -p /tmp/drive9-fe/site/releases
          cp dist/* /tmp/drive9-fe/site/releases/
          cd /tmp/drive9-fe
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/releases/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "release: drive9 CLI ${{ env.VERSION }}"
          git pull --rebase
          git push
