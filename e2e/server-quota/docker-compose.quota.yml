services:
  meta-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: drive9_meta
    ports:
      - "13306:3306"
    volumes:
      - meta-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 2s
      timeout: 5s
      retries: 15
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  tenant-db:
    image: pingcap/tidb:v8.5.6
    ports:
      - "14000:4000"
      - "10080:10080"
    volumes:
      - tenant-data:/tmp/tidb
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4000"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  meta-data:
  tenant-data:
